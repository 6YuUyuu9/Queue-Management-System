<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo user</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h2>Demo User</h2>

    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
    <button onclick="getUserInfo()">Get User Info</button>
    <button onclick="logout()">Logout</button>

    <script>
        const apiUrl = '../api/user.php';

        async function register() {
            const userData = {
                username: 'testuser',
                password: 'password123',
                role: 'customer' // or 'staff'
            };

            try {
                const response = await axios.post(`${apiUrl}/register`, userData);
                alert('Registration successful: ' + response.data.message);
            } catch (error) {
                alert('Registration failed: ' + error.response.data.message);
            }
        }

        async function login() {
            const credentials = {
                username: 'testuser',
                password: 'password123'
            };

            try {
                const response = await axios.post(`${apiUrl}/login`, credentials);
                localStorage.setItem('token', response.data.token);
                alert('Login successful!');
            } catch (error) {
                alert('Login failed: ' + error.response.data.message);
            }
        }

        async function getUserInfo() {
            const token = localStorage.getItem('token');

            try {
                const response = await axios.get(`${apiUrl}/info`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                alert('User Info: ' + JSON.stringify(response.data));
            } catch (error) {
                alert('Failed to get user info: ' + error.response.data.message);
            }
        }

        async function logout() {
            localStorage.removeItem('token');
            alert('Logged out successfully!');
        }
    </script>
</body>
</html>
